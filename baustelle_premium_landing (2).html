<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website im Aufbau</title>
  <meta name="description" content="Unsere Website befindet sich aktuell im Aufbau. Bald erwartet Sie ein neuer, hochwertiger Online-Auftritt." />
  <style>
    :root {
      --bg: #0d0d0f;
      --bg-soft: #151519;
      --card: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.10);
      --text: #f5f5f2;
      --muted: #bdbdb6;
      --accent: #d4af37;
      --accent-soft: rgba(212, 175, 55, 0.16);
      --shadow: 0 30px 80px rgba(0,0,0,0.45);
      --radius: 28px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(212,175,55,0.14), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.06), transparent 22%),
        linear-gradient(135deg, #09090b 0%, #111114 52%, #17171b 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: hidden;
    }

    .shell {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      max-width: 200px;
      opacity: 0.95;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 50px 30px;
    }

    h1 {
      font-size: clamp(38px, 5vw, 70px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); }

    p {
      margin-top: 20px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .contact {
      margin-top: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 26px;
      border-radius: 999px;
      background: var(--accent);
      color: black;
      text-decoration: none;
      font-weight: 600;
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(212,175,55,0.35);
    }

    .mail {
      margin-top: 20px;
      font-size: 15px;
      color: var(--muted);
    }

    .mail a {
      color: var(--text);
      text-decoration: none;
    }

    .whatsapp-icon {
      width: 20px;
      height: 20px;
      fill: black;
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="logo">
      <img src="logo.svg" alt="Fly & Froth Logo">
    </div>

    <div class="card">

      <h1>Wir sind <span>bald</span> online.</h1>

      <p>
        Unsere Website befindet sich aktuell im Aufbau.
        Wir arbeiten im Hintergrund an einem modernen, hochwertigen Auftritt.
      </p>

      <div class="contact">
        <a class="btn" href="https://wa.me/491631474127" target="_blank">
          <svg class="whatsapp-icon" viewBox="0 0 24 24">
            <path d="M20.52 3.48A11.82 11.82 0 0012.01 0C5.38 0 .02 5.36.02 11.99c0 2.11.55 4.17 1.6 5.99L0 24l6.2-1.62a11.93 11.93 0 005.8 1.48h.01c6.63 0 11.99-5.36 11.99-11.99 0-3.2-1.25-6.2-3.48-8.39zM12 21.45a9.4 9.4 0 01-4.8-1.31l-.34-.2-3.68.96.98-3.59-.22-.37a9.39 9.39 0 01-1.44-5.02C2.5 6.36 6.36 2.5 12 2.5c2.51 0 4.86.98 6.63 2.75a9.33 9.33 0 012.75 6.63c0 5.64-3.86 9.57-9.38 9.57zm5.17-7.23c-.28-.14-1.65-.81-1.9-.9-.25-.09-.43-.14-.62.14-.18.28-.71.9-.87 1.08-.16.18-.32.2-.6.07-.28-.14-1.2-.44-2.29-1.4-.85-.76-1.43-1.7-1.6-1.98-.16-.28-.02-.43.12-.57.13-.13.28-.32.42-.48.14-.16.18-.28.28-.46.09-.18.05-.34-.02-.48-.07-.14-.62-1.5-.85-2.06-.22-.53-.45-.46-.62-.47h-.53c-.18 0-.48.07-.73.34-.25.28-.96.94-.96 2.3s.98 2.67 1.12 2.86c.14.18 1.93 2.95 4.68 4.14.65.28 1.16.44 1.56.56.65.21 1.24.18 1.7.11.52-.08 1.65-.67 1.88-1.31.23-.64.23-1.19.16-1.31-.07-.11-.25-.18-.53-.32z"/>
          </svg>
          WhatsApp kontaktieren
        </a>

        <div class="mail">
          oder per Mail: <a href="mailto:info@fly-froth.com">info@fly-froth.com</a>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
